# ci
include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - lint
  - test
  - security
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.python_before_script: &python_before_script
  - python3 --version
  - pip install --quiet ruff bandit detect-secrets pip-audit

# Hard gate — code must be clean before anything else runs
ruff:
  stage: lint
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - ruff check .
    - ruff format --check .

# Unit tests (required gate). SAST template adds semgrep-sast in the same stage.
pytest:
  stage: test
  image: python:3.12-bookworm
  cache:
    key:
      files:
        - requirements.txt
        - requirements-dev.txt
    paths:
      - .cache/pip
  before_script:
    - python3 --version
    - pip install --quiet -r requirements.txt -r requirements-dev.txt
    - pip install --quiet -e .
  script:
    - pytest tests/ -q --tb=short

# Security scanners are informational: allow_failure + artifacts.when: always
# so HTML/JSON reports still exist for collect_reports.

bandit:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - bandit -r "$CI_PROJECT_DIR" -x "$CI_PROJECT_DIR/.venv,$CI_PROJECT_DIR/tests" -v -f html -o bandit-report.html
  artifacts:
    when: always
    paths:
      - bandit-report.html
  allow_failure: true

detect_secrets:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - detect-secrets scan --all-files --exclude-files '\.git/config' > .secrets.baseline
  artifacts:
    when: always
    paths:
      - .secrets.baseline
  allow_failure: true

pip_audit:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    # Upgrade pip so the audit targets project deps, not CVEs in the image's old pip
    - pip install --quiet --upgrade "pip>=26.0"
    - pip install --quiet -e .
    - pip-audit --format json -o pip-audit-report.json
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
  allow_failure: true

trivy_fs_scan:
  stage: security
  image:
    # :latest can 404 on some registries; pin a known tag (see Docker Hub aquasec/trivy)
    name: aquasec/trivy:0.59.1
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL . -f json -o trivy-fs-report.json
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
  allow_failure: true

trivy_python_image_scan:
  stage: security
  image:
    name: aquasec/trivy:0.59.1
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL python:3.12-bookworm -f json -o trivy-image-report.json
  artifacts:
    when: always
    paths:
      - trivy-image-report.json
  allow_failure: true

# Aggregate security artifacts for download from the pipeline (not GitLab Pages).
collect_reports:
  stage: deploy
  image: python:3.12-alpine
  when: always
  needs:
    - job: pytest
      artifacts: false
    - job: bandit
      artifacts: true
      optional: true
    - job: pip_audit
      artifacts: true
      optional: true
    - job: trivy_fs_scan
      artifacts: true
      optional: true
    - job: trivy_python_image_scan
      artifacts: true
      optional: true
    - job: detect_secrets
      artifacts: true
      optional: true
  before_script: *python_before_script
  script:
    - mkdir -p public
    - cp bandit-report.html public/ 2>/dev/null || echo "bandit-report.html not found"
    - cp pip-audit-report.json public/ 2>/dev/null || echo "pip-audit-report.json not found"
    - cp trivy-fs-report.json public/ 2>/dev/null || echo "trivy-fs-report.json not found"
    - cp trivy-image-report.json public/ 2>/dev/null || echo "trivy-image-report.json not found"
    - cp .secrets.baseline public/ 2>/dev/null || echo ".secrets.baseline not found"
    - if [ -f pip-audit-report.json ]; then python3 opnsense_mcp/tools/convert_pip_audit_to_html.py pip-audit-report.json public/pip-audit-report.html; else echo "pip-audit-report.json not found, skipping conversion"; fi
    - if [ -f trivy-fs-report.json ]; then python3 opnsense_mcp/tools/convert_trivy_to_html.py trivy-fs-report.json public/trivy-fs-report.html; else echo "trivy-fs-report.json not found, skipping conversion"; fi
    - if [ -f trivy-image-report.json ]; then python3 opnsense_mcp/tools/convert_trivy_to_html.py trivy-image-report.json public/trivy-image-report.html; else echo "trivy-image-report.json not found, skipping conversion"; fi
    - |
      python3 -c "
      import os
      files = os.listdir('public')
      with open('public/index.html', 'w') as f:
          f.write('<html><head><title>Security Reports</title></head><body>')
          f.write('<h1>Security Reports</h1>')
          for file in sorted(files):
              if file != 'index.html':
                  f.write(f'<a href=\"{file}\">{file}</a><br>')
          f.write('</body></html>')
      "
  artifacts:
    paths:
      - public
    expire_in: 1 week
