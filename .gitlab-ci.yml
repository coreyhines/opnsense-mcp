# ci
# Image digests are multi-arch manifest list digests from Docker Hub (library/python, aquasec/trivy).
#
# Merge request pipelines: GitLab requires `workflow: rules` or per-job `rules` that match
# `CI_PIPELINE_SOURCE == "merge_request_event"` in *this* file. Rules only in `include:` do not
# satisfy that prerequisite, otherwise MR pipelines can compile to almost nothing (e.g. only jobs
# that reference `$CI_MERGE_REQUEST_IID` in root rules).
include:
  - template: Security/SAST.gitlab-ci.yml

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

default:
  interruptible: true

# Skip the full test/lint pipeline when only the flent baseline job should run.
# (GitLab on this instance does not support `default: rules`.)
.skip_flent_baseline_only:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
      when: never
    - when: on_success

stages:
  - lint
  - scanning
  - test
  - security
  - build
  - deploy
  - observe

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Minimum line coverage for opnsense_mcp (ratchet upward as tests grow).
  PYTEST_COV_FAIL_UNDER: "40"
  PYTHON_312_ALPINE_IMAGE: "docker.io/library/python@sha256:a190708a2dec1bd18b1decb539f8e8f5407abaa9bf39cacda583f7f8c11db322"
  PYTHON_312_BOOKWORM_IMAGE: "docker.io/library/python@sha256:868caacbb670a798da4741cb4944aee2d90adb753b15b17bff98242d76bb9144"
  TRIVY_IMAGE: "docker.io/aquasec/trivy@sha256:029e990b328d149bf0a9ffe355919041e1f86192db2df47e217f8a36dd42ceac"

.python_before_script: &python_before_script
  - python3 --version
  - pip install --quiet ruff bandit detect-secrets pip-audit

# Hard gate — code must be clean before anything else runs
ruff:
  extends: .skip_flent_baseline_only
  stage: lint
  timeout: 15m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script: *python_before_script
  script:
    - ruff check .
    - ruff format --check .

gitleaks:
  extends: .skip_flent_baseline_only
  stage: scanning
  image:
    name: ghcr.io/gitleaks/gitleaks:v8.30.1
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - gitleaks detect --config .gitleaks.toml --redact --log-opts main --verbose
  allow_failure: false

# GitGuardian — secret scan of commits in CI (requires masked GITGUARDIAN_API_KEY in CI/CD variables).
gitguardian_scan:
  extends: .skip_flent_baseline_only
  stage: scanning
  timeout: 20m
  dependencies: []
  image:
    name: docker.io/gitguardian/ggshield:latest
    pull_policy: if-not-present
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  script:
    - |
      if [ -z "${GITGUARDIAN_API_KEY:-}" ]; then
        echo "ERROR: GITGUARDIAN_API_KEY is not set. Add a masked CI/CD variable in GitLab (project or group) with your GitGuardian service account token."
        exit 1
      fi
    - export GITGUARDIAN_API_KEY="$GITGUARDIAN_API_KEY"
    - ggshield -c .gitguardian.yaml secret scan ci
  allow_failure: false

# Unit tests (required gate). SAST template adds semgrep-sast in the same stage.
pytest:
  extends: .skip_flent_baseline_only
  stage: test
  timeout: 25m
  dependencies: []
  image:
    name: $PYTHON_312_BOOKWORM_IMAGE
  cache:
    key:
      files:
        - requirements.txt
        - requirements-dev.txt
    paths:
      - .cache/pip
  before_script:
    - python3 --version
    - pip install --quiet -r requirements.txt -r requirements-dev.txt
  script:
    - >
      pytest tests/ -q --tb=short
      --cov=opnsense_mcp
      --cov-report=xml:coverage.xml
      --cov-report=term
      --cov-fail-under=${PYTEST_COV_FAIL_UNDER}
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

# Security: informational scanners (dev/editable env and repo-wide heuristics) + hard gates below.

bandit:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 20m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script: *python_before_script
  script:
    # --exit-zero: still emit HTML findings but do not fail the job (allow_failure is true; avoids red noise).
    - bandit -r "$CI_PROJECT_DIR" -x "$CI_PROJECT_DIR/.venv,$CI_PROJECT_DIR/tests" -v -f html -o bandit-report.html --exit-zero
  artifacts:
    when: always
    paths:
      - bandit-report.html
  allow_failure: true

detect_secrets:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 15m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script: *python_before_script
  script:
    # Phase 0 diagnostics fixtures contain live firewall IDs that look like high-entropy secrets.
    - detect-secrets scan --all-files --exclude-files '\.git/config|tests/fixtures/phase0-diagnostics/.*' > .secrets.baseline
  artifacts:
    when: always
    paths:
      - .secrets.baseline
  allow_failure: true

# Full tree + editable install — often includes dev-only CVE noise; keep informational.
pip_audit:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 25m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script: *python_before_script
  script:
    # Upgrade pip so the audit targets project deps, not CVEs in the image's old pip
    - pip install --quiet --upgrade "pip>=26.0"
    - pip install --quiet -e .
    - pip-audit --progress-spinner off --format json -o pip-audit-report.json
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
  allow_failure: true

# Production dependency closure only (requirements.txt) — blocking supply-chain gate.
pip_audit_prod:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 25m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script:
    - python3 --version
    - pip install --quiet --upgrade "pip>=26.0"
    - pip install --quiet pip-audit
  script:
    - python3 -m venv .ci-venv-prod-audit
    - . .ci-venv-prod-audit/bin/activate
    - pip install --quiet -r requirements.txt
    - pip-audit --progress-spinner off -f json -o pip-audit-prod.json
  artifacts:
    when: always
    paths:
      - pip-audit-prod.json
  allow_failure: false

# CycloneDX SBOM for the production dependency closure (downloadable artifact).
sbom:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 25m
  dependencies: []
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  before_script:
    - python3 --version
    - pip install --quiet --upgrade "pip>=26.0"
    - pip install --quiet pip-audit
  script:
    - python3 -m venv .ci-venv-sbom
    - . .ci-venv-sbom/bin/activate
    - pip install --quiet -r requirements.txt
    - pip-audit --progress-spinner off -f cyclonedx-json -o sbom.cdx.json
  artifacts:
    when: always
    paths:
      - sbom.cdx.json
    expire_in: 4 weeks
  allow_failure: false

# Repo filesystem — HIGH/CRITICAL only; blocking container-supply-chain posture for the repo tree.
trivy_fs_scan:
  extends: .skip_flent_baseline_only
  stage: security
  timeout: 30m
  dependencies: []
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL . -f json -o trivy-fs-report.json
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
  allow_failure: false

build:image:
  stage: build
  timeout: 30m
  tags:
    - strongpod
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - script_failure
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    OPNSENSE_MCP_IMAGE: hub.freeblizz.com/opnsense-mcp
  before_script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        OPNSENSE_MCP_IMAGE_TAG="${CI_COMMIT_TAG#v}"
      else
        _pyproject_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -1)"
        OPNSENSE_MCP_IMAGE_TAG="${_pyproject_version}-dev.${CI_COMMIT_SHORT_SHA}"
      fi
      export OPNSENSE_MCP_IMAGE_TAG
      echo "OPNSENSE_MCP_IMAGE_TAG=${OPNSENSE_MCP_IMAGE_TAG}" | tee image-tag.env
    - mkdir -p /kaniko/.docker
    - |
      if [ -n "${HUB_FREEBLIZZ_USER:-}" ] && [ -n "${HUB_FREEBLIZZ_PASSWORD:-}" ]; then
        echo "{\"auths\":{\"hub.freeblizz.com\":{\"auth\":\"$(echo -n "${HUB_FREEBLIZZ_USER}:${HUB_FREEBLIZZ_PASSWORD}" | base64 -w 0)\"}}}" > /kaniko/.docker/config.json
      else
        echo "No HUB_FREEBLIZZ_* CI variables; using network-local hub.freeblizz.com access."
      fi
  script:
    - echo "Pushing ${OPNSENSE_MCP_IMAGE}:${OPNSENSE_MCP_IMAGE_TAG}"
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile deploy/Containerfile
      --build-arg "GIT_COMMIT=${CI_COMMIT_SHORT_SHA}"
      --build-arg "GIT_REF=${CI_COMMIT_REF_NAME}"
      --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --push-retry 3
      --destination "${OPNSENSE_MCP_IMAGE}:${OPNSENSE_MCP_IMAGE_TAG}"
  artifacts:
    reports:
      dotenv: image-tag.env
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

.deploy_ssh:
  before_script:
    - apk add --no-cache openssh-client bash
    - bash deploy/ci/ssh-setup.sh

deploy:strongpod:
  stage: deploy
  timeout: 20m
  image: alpine:3.22.0
  extends: .deploy_ssh
  variables:
    OPNSENSE_MCP_IMAGE_REPO: hub.freeblizz.com/opnsense-mcp
  script:
    - scp deploy/ci/deploy-strongpod.sh "${OPNSENSE_MCP_DEPLOY_USER:-root}@${OPNSENSE_MCP_DEPLOY_HOST}:/tmp/opnsense-mcp-deploy.sh"
    - |
      ssh -o StrictHostKeyChecking=no "${OPNSENSE_MCP_DEPLOY_USER:-root}@${OPNSENSE_MCP_DEPLOY_HOST}" \
        "sudo env OPNSENSE_MCP_IMAGE_REPO=${OPNSENSE_MCP_IMAGE_REPO} OPNSENSE_MCP_IMAGE_TAG=${OPNSENSE_MCP_IMAGE_TAG} bash /tmp/opnsense-mcp-deploy.sh"
  needs:
    - job: build:image
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" && $OPNSENSE_MCP_DEPLOY_HOST != "" && ($OPNSENSE_MCP_DEPLOY_SSH_KEY_B64 != "" || $OPNSENSE_MCP_DEPLOY_SSH_KEY != "")'
      when: manual
      allow_failure: false
    - if: '$CI_COMMIT_TAG && $OPNSENSE_MCP_DEPLOY_HOST != "" && ($OPNSENSE_MCP_DEPLOY_SSH_KEY_B64 != "" || $OPNSENSE_MCP_DEPLOY_SSH_KEY != "")'
      when: manual
      allow_failure: false
  environment:
    name: strongpod
    url: https://opnsense-mcp.freeblizz.com/mcp

# Aggregate security artifacts for download from the pipeline (not GitLab Pages).
.collect_reports_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
      when: never
    - when: always

collect_reports:
  stage: deploy
  timeout: 15m
  image:
    name: $PYTHON_312_ALPINE_IMAGE
  extends: .collect_reports_rules
  when: always
  needs:
    - job: pytest
      artifacts: true
      optional: false
    - job: bandit
      artifacts: true
      optional: true
    - job: pip_audit
      artifacts: true
      optional: true
    - job: pip_audit_prod
      artifacts: true
      optional: true
    - job: sbom
      artifacts: true
      optional: true
    - job: trivy_fs_scan
      artifacts: true
      optional: true
    - job: detect_secrets
      artifacts: true
      optional: true
  before_script: *python_before_script
  script:
    - mkdir -p public
    - cp coverage.xml public/ 2>/dev/null || echo "coverage.xml not found"
    - cp bandit-report.html public/ 2>/dev/null || echo "bandit-report.html not found"
    - cp pip-audit-report.json public/ 2>/dev/null || echo "pip-audit-report.json not found"
    - cp pip-audit-prod.json public/ 2>/dev/null || echo "pip-audit-prod.json not found"
    - cp sbom.cdx.json public/ 2>/dev/null || echo "sbom.cdx.json not found"
    - cp trivy-fs-report.json public/ 2>/dev/null || echo "trivy-fs-report.json not found"
    - cp .secrets.baseline public/ 2>/dev/null || echo ".secrets.baseline not found"
    - if [ -f pip-audit-report.json ]; then python3 opnsense_mcp/tools/convert_pip_audit_to_html.py pip-audit-report.json public/pip-audit-report.html; else echo "pip-audit-report.json not found, skipping conversion"; fi
    - if [ -f pip-audit-prod.json ]; then python3 opnsense_mcp/tools/convert_pip_audit_to_html.py pip-audit-prod.json public/pip-audit-prod.html; else echo "pip-audit-prod.json not found, skipping conversion"; fi
    - if [ -f trivy-fs-report.json ]; then python3 opnsense_mcp/tools/convert_trivy_to_html.py trivy-fs-report.json public/trivy-fs-report.html; else echo "trivy-fs-report.json not found, skipping conversion"; fi
    - |
      python3 -c "
      import os
      files = os.listdir('public')
      with open('public/index.html', 'w') as f:
          f.write('<html><head><title>Security Reports</title></head><body>')
          f.write('<h1>Security Reports</h1>')
          for file in sorted(files):
              if file != 'index.html':
                  f.write(f'<a href=\"{file}\">{file}</a><br>')
          f.write('</body></html>')
      "
  artifacts:
    paths:
      - public
    expire_in: 1 week

# Scheduled FQ-CoDel baseline: flent rrul from net-10 sidecar on strongpod.
# Create a GitLab pipeline schedule on main with variable SCHEDULED_JOB=flent-baseline
# (recommended cron: 0 6 * * 1 — weekly Monday 06:00 UTC).
# Optional CI variables: FLENT_ICMP_MAX_MS (default 145), FLENT_LENGTH, FLENT_RUNS,
# NETPERF_HOST (default netperf-eu.bufferbloat.net).

# Override SAST template job for flent-only pipelines.
semgrep-sast:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
      when: never
    - when: on_success

.flent_baseline_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "flent-baseline"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $FLENT_BASELINE == "true"'
    - when: never

flent:baseline:
  stage: observe
  timeout: 45m
  image: alpine:3.22.0
  extends: .flent_baseline_rules
  variables:
    FLENT_LABEL: "ci-baseline-${CI_PIPELINE_ID}"
    NETPERF_HOST: "netperf-eu.bufferbloat.net"
    FLENT_LENGTH: "60"
    FLENT_RUNS: "3"
    FLENT_ICMP_MAX_MS: "145"
  before_script:
    - apk add --no-cache openssh-client bash python3
    - bash deploy/ci/ssh-setup.sh
  script:
    - bash deploy/ci/run-flent-baseline-remote.sh
    - |
      set -a
      # shellcheck disable=SC1091
      source flent-artifacts/flent.env
      set +a
      python3 opnsense_mcp/utils/flent_summary.py \
        "${SUMMARY_FILE}" \
        --json-out flent-artifacts/flent-gate.json
  artifacts:
    when: always
    paths:
      - flent-artifacts/
    reports:
      dotenv: flent-artifacts/flent.env
    expire_in: 4 weeks
  allow_failure: false
