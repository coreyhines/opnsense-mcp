# ci
include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - lint
  - test
  - security
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.python_before_script: &python_before_script
  - python3 --version
  - pip install --quiet ruff bandit detect-secrets pip-audit

# Hard gate — code must be clean before anything else runs
ruff:
  stage: lint
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - ruff check .
    - ruff format --check .

ai-review:
  stage: lint
  image:
    name: nikitafilonov/ai-review:latest
    pull_policy: if-not-present
  script:
    - |
      if [ -z "${OLLAMA_API_KEY:-}" ]; then
        echo "ERROR: OLLAMA_API_KEY is missing. Add it in GitLab CI/CD Variables and ensure scope/protection allow this pipeline."
        exit 1
      fi
    - export LLM__HTTP_CLIENT__API_TOKEN="$OLLAMA_API_KEY"
    - export LLM__META__MODEL="${OLLAMA_REVIEW_MODEL:-kimi-k2.6:cloud}"
    - export VCS__HTTP_CLIENT__API_TOKEN="${GITLAB_AI_REVIEW_TOKEN:-$CI_JOB_TOKEN}"
    - mkdir -p log
    - ai-review clear-summary || true
    - ai-review run-context 2>&1 | tee log/ai-review-context.log || true
    - |
      if rg -n "RemoteProtocolError|Server disconnected without sending a response" log/ai-review-context.log; then
        echo "Transient Ollama disconnect detected in context review, retrying once..."
        ai-review run-context 2>&1 | tee log/ai-review-context-retry.log || true
        cp log/ai-review-context-retry.log log/ai-review-context.log
      fi
    - |
      if rg -n "LLM returned an empty response|LLM returned empty string for inline review|No inline comments from context review" log/ai-review-context.log; then
        echo "Low-signal context output detected, retrying context review once..."
        ai-review run-context 2>&1 | tee log/ai-review-context-empty-retry.log || true
        cp log/ai-review-context-empty-retry.log log/ai-review-context.log
      fi
    - ai-review run-summary 2>&1 | tee log/ai-review-summary.log || true
    - |
      if rg -n "RemoteProtocolError|Server disconnected without sending a response" log/ai-review-summary.log; then
        echo "Transient Ollama disconnect detected in summary review, retrying once..."
        ai-review run-summary 2>&1 | tee log/ai-review-summary-retry.log || true
        cp log/ai-review-summary-retry.log log/ai-review-summary.log
      fi
    - |
      if rg -i -n "no (significant )?issues found|nothing to improve|overall( the)? changes (look|looks) good|lgtm|good job" log/ai-review-summary.log; then
        echo "Low-signal summary detected; clearing summary comment."
        ai-review clear-summary || true
      fi
    - cat log/ai-review-context.log log/ai-review-summary.log > log/ai-review.log
    - |
      if rg -n "ValidationError:|Input should be a valid URL|LLM request failed|RemoteProtocolError|Server disconnected without sending a response|\\[OllamaHTTPClient\\] 401|OPENAI_V1_HTTP_CLIENT.*Status 401|GitLabMergeRequestsHTTPClient.*401|Failed to (create|process) (inline|summary|general) comment|Summary LLM output was empty|LLM returned empty summary" log/ai-review.log; then
        echo "ERROR: ai-review encountered an auth or comment-posting failure."
        exit 1
      fi
  variables:
    # Ollama Cloud API endpoint and auth
    LLM__PROVIDER: "OPENAI"
    LLM__META__MAX_TOKENS: "4000"
    LLM__META__TEMPERATURE: "0.2"
    LLM__HTTP_CLIENT__API_URL: "https://ollama.com/v1"
    # GitLab MR context
    VCS__PROVIDER: "GITLAB"
    VCS__PIPELINE__PROJECT_ID: "$CI_PROJECT_ID"
    VCS__PIPELINE__MERGE_REQUEST_ID: "$CI_MERGE_REQUEST_IID"
    VCS__HTTP_CLIENT__API_URL: "$CI_SERVER_URL"
  allow_failure: false
  artifacts:
    when: always
    paths:
      - log/ai-review.log
      - log/ai-review-context.log
      - log/ai-review-summary.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_MERGE_REQUEST_IID'
      when: manual

# Unit tests (required gate). SAST template adds semgrep-sast in the same stage.
pytest:
  stage: test
  image: python:3.12-bookworm
  cache:
    key:
      files:
        - requirements.txt
        - requirements-dev.txt
    paths:
      - .cache/pip
  before_script:
    - python3 --version
    - pip install --quiet -r requirements.txt -r requirements-dev.txt
    - pip install --quiet -e .
  script:
    - pytest tests/ -q --tb=short

# Security scanners are informational: allow_failure + artifacts.when: always
# so HTML/JSON reports still exist for collect_reports.

bandit:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - bandit -r "$CI_PROJECT_DIR" -x "$CI_PROJECT_DIR/.venv,$CI_PROJECT_DIR/tests" -v -f html -o bandit-report.html
  artifacts:
    when: always
    paths:
      - bandit-report.html
  allow_failure: true

detect_secrets:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    - detect-secrets scan --all-files --exclude-files '\.git/config' > .secrets.baseline
  artifacts:
    when: always
    paths:
      - .secrets.baseline
  allow_failure: true

pip_audit:
  stage: security
  image: python:3.12-alpine
  before_script: *python_before_script
  script:
    # Upgrade pip so the audit targets project deps, not CVEs in the image's old pip
    - pip install --quiet --upgrade "pip>=26.0"
    - pip install --quiet -e .
    - pip-audit --format json -o pip-audit-report.json
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
  allow_failure: true

# Repo filesystem only — scanning arbitrary base images (e.g. python:bookworm) is noisy and not app-specific.
trivy_fs_scan:
  stage: security
  image:
    # :latest can 404 on some registries; pin a known tag (see Docker Hub aquasec/trivy)
    name: aquasec/trivy:0.59.1
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL . -f json -o trivy-fs-report.json
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
  allow_failure: true

# Aggregate security artifacts for download from the pipeline (not GitLab Pages).
collect_reports:
  stage: deploy
  image: python:3.12-alpine
  when: always
  needs:
    - job: pytest
      artifacts: false
    - job: bandit
      artifacts: true
      optional: true
    - job: pip_audit
      artifacts: true
      optional: true
    - job: trivy_fs_scan
      artifacts: true
      optional: true
    - job: detect_secrets
      artifacts: true
      optional: true
  before_script: *python_before_script
  script:
    - mkdir -p public
    - cp bandit-report.html public/ 2>/dev/null || echo "bandit-report.html not found"
    - cp pip-audit-report.json public/ 2>/dev/null || echo "pip-audit-report.json not found"
    - cp trivy-fs-report.json public/ 2>/dev/null || echo "trivy-fs-report.json not found"
    - cp .secrets.baseline public/ 2>/dev/null || echo ".secrets.baseline not found"
    - if [ -f pip-audit-report.json ]; then python3 opnsense_mcp/tools/convert_pip_audit_to_html.py pip-audit-report.json public/pip-audit-report.html; else echo "pip-audit-report.json not found, skipping conversion"; fi
    - if [ -f trivy-fs-report.json ]; then python3 opnsense_mcp/tools/convert_trivy_to_html.py trivy-fs-report.json public/trivy-fs-report.html; else echo "trivy-fs-report.json not found, skipping conversion"; fi
    - |
      python3 -c "
      import os
      files = os.listdir('public')
      with open('public/index.html', 'w') as f:
          f.write('<html><head><title>Security Reports</title></head><body>')
          f.write('<h1>Security Reports</h1>')
          for file in sorted(files):
              if file != 'index.html':
                  f.write(f'<a href=\"{file}\">{file}</a><br>')
          f.write('</body></html>')
      "
  artifacts:
    paths:
      - public
    expire_in: 1 week
